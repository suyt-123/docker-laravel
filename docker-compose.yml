services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: tinhouse-backend-app:dev
    container_name: tinhouse-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      HOME: /tmp
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      BROWSERSHOT_CHROME_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - tinhouse

  nginx:
    image: nginx:1.27-alpine
    container_name: tinhouse-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - tinhouse

  postgres:
    image: postgres:18-alpine
    container_name: tinhouse-postgres
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-tinhouse}"
      POSTGRES_USER: "${DB_USERNAME:-tinhouse}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tinhouse

  redis:
    image: redis:7-alpine
    container_name: tinhouse-redis
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - tinhouse

  minio:
    image: minio/minio:latest
    container_name: tinhouse-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_FORWARD_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_FORWARD_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio-data:/data
    networks:
      - tinhouse

  mailpit:
    image: axllent/mailpit:latest
    container_name: tinhouse-mailpit
    ports:
      - "${MAILPIT_FORWARD_PORT:-8025}:8025"
    networks:
      - tinhouse

  adminer:
    image: adminer:latest
    container_name: tinhouse-adminer
    ports:
      - "${ADMINER_FORWARD_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tinhouse

  node:
    image: node:24
    container_name: tinhouse-node
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${VITE_FORWARD_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_APP_NAME: "${APP_NAME:-Tinhouse}"
    networks:
      - tinhouse

networks:
  tinhouse:
    driver: bridge

volumes:
  composer-cache:
  postgres-data:
  redis-data:
  minio-data:
