openapi: 3.1.0
info:
  title: Tinhouse ERP API
  version: 1.0.0
  description: >
    Versioned API contract for the Laravel/Inertia ERP. The ERP remains
    Inertia-first; API endpoints are added only for explicit external,
    app, public-page, automation, or edge-service consumers.
servers:
  - url: /api/v1
security:
  - bearerToken: []
paths:
  /materials:
    get:
      operationId: listMaterials
      summary: List materials
      tags: [Materials]
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 255
        - name: category
          in: query
          schema:
            type: integer
        - name: stock
          in: query
          schema:
            type: string
            enum: [low]
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, -created_at, name, -name, current_stock, -current_stock, safe_stock, -safe_stock]
            default: -created_at
      responses:
        '200':
          description: Materials list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MaterialIndexItem'
                      meta:
                        type: object
                        required: [pagination, filters, categories, units]
                        properties:
                          pagination:
                            $ref: '#/components/schemas/PaginationMeta'
                          filters:
                            type: object
                          categories:
                            type: array
                            items:
                              $ref: '#/components/schemas/MaterialCategory'
                          units:
                            type: array
                            items:
                              type: string
                      links:
                        $ref: '#/components/schemas/PaginationLinks'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    post:
      operationId: createMaterial
      summary: Create a material
      tags: [Materials]
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialWrite'
      responses:
        '201':
          description: Material created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Material'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /materials/{material}:
    parameters:
      - name: material
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getMaterial
      summary: Get a material
      tags: [Materials]
      responses:
        '200':
          description: Material detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Material'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateMaterial
      summary: Update a material
      tags: [Materials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialWrite'
      responses:
        '200':
          description: Material updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Material'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      operationId: deleteMaterial
      summary: Delete a material
      tags: [Materials]
      responses:
        '200':
          description: Material deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [deleted_material_id]
                        properties:
                          deleted_material_id:
                            type: integer
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: Sanctum personal access token
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    Unauthenticated:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Missing RBAC capability, token ability, or object visibility
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      required: [data, meta, links, message]
      properties:
        data: {}
        meta:
          type: object
        links:
          type: object
        message:
          type:
            - string
            - 'null'
    ErrorEnvelope:
      type: object
      required: [message, code, errors, meta]
      properties:
        message:
          type: string
        code:
          type: string
          enum:
            - unauthenticated
            - forbidden
            - not_found
            - validation_failed
            - token_ability_missing
            - domain_state_invalid
            - rate_limited
            - server_error
        errors:
          type: object
        meta:
          type: object
    PaginationMeta:
      type: object
      required: [current_page, from, last_page, per_page, to, total]
      properties:
        current_page:
          type: integer
        from:
          type:
            - integer
            - 'null'
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type:
            - integer
            - 'null'
        total:
          type: integer
    PaginationLinks:
      type: object
      required: [first, last, prev, next]
      properties:
        first:
          type:
            - string
            - 'null'
        last:
          type:
            - string
            - 'null'
        prev:
          type:
            - string
            - 'null'
        next:
          type:
            - string
            - 'null'
    MaterialCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type:
            - string
            - 'null'
    MaterialIndexItem:
      allOf:
        - $ref: '#/components/schemas/MaterialBase'
        - type: object
          properties:
            quotation_items_count:
              type: integer
            inventory_transactions_count:
              type: integer
    Material:
      allOf:
        - $ref: '#/components/schemas/MaterialBase'
        - type: object
          properties:
            quotation_items:
              type: array
              items:
                type: object
            inventory_transactions:
              type: array
              items:
                type: object
    MaterialBase:
      type: object
      required: [id, name, unit, safe_stock, current_stock]
      properties:
        id:
          type: integer
        name:
          type: string
        spec:
          type:
            - string
            - 'null'
        unit:
          type: string
        category:
          anyOf:
            - $ref: '#/components/schemas/MaterialCategory'
            - type: 'null'
        length:
          type:
            - string
            - 'null'
        width:
          type:
            - string
            - 'null'
        thickness:
          type:
            - string
            - 'null'
        weight:
          type:
            - string
            - 'null'
        cost_price:
          type: integer
        sale_price:
          type: integer
        safe_stock:
          type: string
        current_stock:
          type: string
    MaterialWrite:
      type: object
      required: [name, unit]
      properties:
        material_category_id:
          type:
            - integer
            - 'null'
        category_name:
          type:
            - string
            - 'null'
          maxLength: 100
        name:
          type: string
          maxLength: 255
        spec:
          type:
            - string
            - 'null'
          maxLength: 255
        unit:
          type: string
          maxLength: 32
        length:
          type:
            - number
            - 'null'
          minimum: 0
        width:
          type:
            - number
            - 'null'
          minimum: 0
        thickness:
          type:
            - number
            - 'null'
          minimum: 0
        weight:
          type:
            - number
            - 'null'
          minimum: 0
        cost_price:
          type:
            - integer
            - 'null'
          minimum: 0
        sale_price:
          type:
            - integer
            - 'null'
          minimum: 0
        safe_stock:
          type:
            - number
            - 'null'
          minimum: 0
        current_stock:
          type:
            - number
            - 'null'
          minimum: 0
